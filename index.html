<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador de Países</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Fuentes premium: Playfair Display para títulos, Inter para el cuerpo y JetBrains Mono para etiquetas -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1326; /* Azul marino profundo de fondo */
    --card: #131c31; /* Tarjetas azul oscuro */
    --border: #222f4d; /* Bordes sutiles */
    --accent: #c29953; /* Dorado elegante de tu captura */
    --accent-hover: #a88142;
    --text: #f1f5f9; /* Blanco suave */
    --text-muted: #808ea3; /* Gris de soporte */
    --error-bg: #2d1313;
    --error-text: #fca5a5;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  
  .wrap { max-width: 900px; margin: 0 auto; padding: 4rem 1.5rem 6rem; }

  /* Encabezado perfectamente centrado con estilo editorial */
  header {
    text-align: center;
    margin-bottom: 3rem;
  }
  .data-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--accent);
    margin: 0 0 1rem;
    font-weight: 600;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    font-weight: 700;
    margin: 0 0 1rem;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  header p {
    margin: 0 auto;
    color: var(--text-muted);
    font-size: 1.05rem;
    max-width: 550px;
    line-height: 1.5;
  }

  .content-section {
    margin-bottom: 2.5rem;
  }

  /* Buscador premium con estética de la captura */
  .search-box {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .search-box input {
    flex: 1;
    padding: 1.1rem 1.3rem;
    font-size: 1.05rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .search-box input:focus { 
    outline: none; 
    border-color: var(--accent); 
    box-shadow: 0 0 0 2px rgba(194, 153, 83, 0.15);
  }
  
  button {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 1.1rem 2rem;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: var(--bg);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: var(--accent-hover); }
  button:active { transform: translateY(1px); }

  /* Chips de regiones estilizados en la parte inferior */
  .regions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 1rem;
  }
  .chip {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.8rem;
    padding: 0.5rem 1.1rem;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: rgba(19, 28, 49, 0.5);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .chip:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  #status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    padding: 1rem 1.25rem;
    border-radius: 8px;
    margin-bottom: 2rem;
    text-align: center;
  }
  #status.hidden { display: none; }
  #status.loading { background: var(--card); border: 1px dashed var(--border); color: var(--text-muted); }
  #status.error { background: var(--error-bg); color: var(--error-text); border: 1px solid #7f1d1d; }

  /* Resultados de la búsqueda */
  #countryPicker {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  #countryPicker.hidden { display: none; }
  
  .pick-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1.1rem;
    cursor: pointer;
    text-align: left;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    width: 100%;
    transition: border-color 0.2s;
  }
  .pick-item:hover { border-color: var(--accent); }
  .pick-item img { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #fff; }

  #detailPanel.hidden { display: none; }
  
  /* Cabecera del país seleccionado */
  .selected-country {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 1.8rem;
    margin-bottom: 2rem;
  }
  .selected-country-left { display: flex; align-items: center; gap: 1.25rem; }
  .selected-country-left img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .selected-country-left h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    margin: 0;
  }
  .selected-country button {
    padding: 0.6rem 1.2rem;
    font-size: 0.8rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .selected-country button:hover { border-color: var(--accent); color: var(--text); }

  /* Selector de características */
  .char-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-bottom: 2rem;
  }
  .char-check {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 500;
    font-size: 0.85rem;
    padding: 0.6rem 1.2rem;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
    transition: all 0.2s;
  }
  .char-check.checked {
    border-color: var(--accent);
    background: rgba(194, 153, 83, 0.1);
    color: var(--accent);
  }
  .char-check input { display: none; }

  /* Ficha de datos final (Estampado premium) */
  .stamp {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 2.2rem;
  }
  .stamp-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem 2rem;
  }
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }
  .field-value {
    font-size: 1.1rem;
    color: var(--text);
    line-height: 1.4;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 2.4rem; }
    .stamp-fields { grid-template-columns: 1fr; }
    .selected-country { flex-direction: column; align-items: flex-start; gap: 1.25rem; }
    .selected-country button { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Explorador de países</h1>
    <p>Escribe el nombre de un país y genera su ficha de información con los datos almacenados al instante</p>
  </header>

  <div class="content-section">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ej. Canada, Mexico, Japan...">
      <button id="searchBtn" type="button">Consultar</button>
    </div>
    <div class="regions">
      <button class="chip" data-region="Americas" type="button">Americas</button>
      <button class="chip" data-region="Africa" type="button">Africa</button>
      <button class="chip" data-region="Asia" type="button">Asia</button>
      <button class="chip" data-region="Europe" type="button">Europe</button>
      <button class="chip" data-region="Oceania" type="button">Oceania</button>
    </div>
  </div>

  <div id="status" class="hidden"></div>

  <div id="countryPicker" class="hidden"></div>

  <div id="detailPanel" class="hidden">
    <div class="selected-country">
      <div class="selected-country-left">
        <img id="selectedFlag" src="" alt="">
        <h2 id="selectedName"></h2>
      </div>
      <button type="button" id="changeCountryBtn">Cambiar país</button>
    </div>

    <div class="content-section">
      <div class="char-picker" id="charPicker"></div>
    </div>

    <div class="stamp">
      <div class="stamp-fields" id="stampFields"></div>
    </div>
  </div>

</div>

<script>
// Base de datos de países local (¡Estable, ultra rápida y sin CORS!)
const COUNTRIES_DB = [
  { name: 'Canadá', nameEn: 'Canada', region: 'Americas', subregion: 'América del Norte', flag: 'https://flagcdn.com/w320/ca.png', capital: 'Ottawa', population: 38000000, area: 9984670, currency: 'Dólar canadiense (CAD)', language: 'Inglés, Francés', borders: 'Estados Unidos', calling: '+1', code: 'CAN' },
  { name: 'México', nameEn: 'Mexico', region: 'Americas', subregion: 'América del Norte', flag: 'https://flagcdn.com/w320/mx.png', capital: 'Ciudad de México', population: 126000000, area: 1964375, currency: 'Peso mexicano (MXN)', language: 'Español', borders: 'Estados Unidos, Guatemala, Belice', calling: '+52', code: 'MEX' },
  { name: 'Estados Unidos', nameEn: 'United States', region: 'Americas', subregion: 'América del Norte', flag: 'https://flagcdn.com/w320/us.png', capital: 'Washington D.C.', population: 331000000, area: 9833517, currency: 'Dólar estadounidense (USD)', language: 'Inglés', borders: 'Canadá, México', calling: '+1', code: 'USA' },
  { name: 'Japón', nameEn: 'Japan', region: 'Asia', subregion: 'Asia Oriental', flag: 'https://flagcdn.com/w320/jp.png', capital: 'Tokio', population: 125800000, area: 377975, currency: 'Yen japonés (JPY)', language: 'Japonés', borders: 'Ninguna (Isla)', calling: '+81', code: 'JPN' },
  { name: 'España', nameEn: 'Spain', region: 'Europe', subregion: 'Europa del Sur', flag: 'https://flagcdn.com/w320/es.png', capital: 'Madrid', population: 47350000, area: 505992, currency: 'Euro (EUR)', language: 'Español, Catalán, Gallego, Euskera', borders: 'Portugal, Francia, Andorra, Marruecos', calling: '+34', code: 'ESP' },
  { name: 'Francia', nameEn: 'France', region: 'Europe', subregion: 'Europa Occidental', flag: 'https://flagcdn.com/w320/fr.png', capital: 'París', population: 67390000, area: 543940, currency: 'Euro (EUR)', language: 'Francés', borders: 'Bélgica, Luxemburgo, Alemania, Suiza, Italia, Mónaco, España, Andorra', calling: '+33', code: 'FRA' },
  { name: 'Alemania', nameEn: 'Germany', region: 'Europe', subregion: 'Europa Central', flag: 'https://flagcdn.com/w320/de.png', capital: 'Berlín', population: 83240000, area: 357114, currency: 'Euro (EUR)', language: 'Alemán', borders: 'Dinamarca, Polonia, República Checa, Austria, Suiza, Francia, Luxemburgo, Bélgica, Países Bajos', calling: '+49', code: 'DEU' },
  { name: 'Reino Unido', nameEn: 'United Kingdom', region: 'Europe', subregion: 'Europa Occidental', flag: 'https://flagcdn.com/w320/gb.png', capital: 'Londres', population: 67210000, area: 242495, currency: 'Libra esterlina (GBP)', language: 'Inglés', borders: 'Irlanda', calling: '+44', code: 'GBR' },
  { name: 'Italia', nameEn: 'Italy', region: 'Europe', subregion: 'Europa del Sur', flag: 'https://flagcdn.com/w320/it.png', capital: 'Roma', population: 59550000, area: 301340, currency: 'Euro (EUR)', language: 'Italiano', borders: 'Francia, Suiza, Austria, Eslovenia, San Marino, Ciudad del Vaticano', calling: '+39', code: 'ITA' },
  { name: 'Argentina', nameEn: 'Argentina', region: 'Americas', subregion: 'América del Sur', flag: 'https://flagcdn.com/w320/ar.png', capital: 'Buenos Aires', population: 45370000, area: 2780400, currency: 'Peso argentino (ARS)', language: 'Español', borders: 'Bolivia, Brasil, Chile, Paraguay, Uruguay', calling: '+54', code: 'ARG' },
  { name: 'Brasil', nameEn: 'Brazil', region: 'Americas', subregion: 'América del Sur', flag: 'https://flagcdn.com/w320/br.png', capital: 'Brasilia', population: 212600000, area: 8515767, currency: 'Real brasileño (BRL)', language: 'Portugués', borders: 'Argentina, Bolivia, Colombia, Guayana Francesa, Guyana, Paraguay, Perú, Surinam, Uruguay, Venezuela', calling: '+55', code: 'BRA' },
  { name: 'Colombia', nameEn: 'Colombia', region: 'Americas', subregion: 'América del Sur', flag: 'https://flagcdn.com/w320/co.png', capital: 'Bogotá', population: 50880000, area: 1141748, currency: 'Peso colombiano (COP)', language: 'Español', borders: 'Brasil, Ecuador, Panamá, Perú, Venezuela', calling: '+57', code: 'COL' },
  { name: 'Chile', nameEn: 'Chile', region: 'Americas', subregion: 'América del Sur', flag: 'https://flagcdn.com/w320/cl.png', capital: 'Santiago', population: 19120000, area: 756102, currency: 'Peso chileno (CLP)', language: 'Español', borders: 'Argentina, Bolivia, Perú', calling: '+56', code: 'CHL' },
  { name: 'China', nameEn: 'China', region: 'Asia', subregion: 'Asia Oriental', flag: 'https://flagcdn.com/w320/cn.png', capital: 'Pekín', population: 1411000000, area: 9596961, currency: 'Renminbi (CNY)', language: 'Chino Mandarín', borders: 'Afganistán, Bután, India, Kazajistán, Kirguistán, Laos, Mongolia, Myanmar, Nepal, Corea del Norte, Pakistán, Rusia, Tayikistán, Vietnam', calling: '+86', code: 'CHN' },
  { name: 'Australia', nameEn: 'Australia', region: 'Oceania', subregion: 'Australia y Nueva Zelanda', flag: 'https://flagcdn.com/w320/au.png', capital: 'Canberra', population: 25690000, area: 7692024, currency: 'Dólar australiano (AUD)', language: 'Inglés', borders: 'Ninguna (Isla)', calling: '+61', code: 'AUS' },
  { name: 'Egipto', nameEn: 'Egypt', region: 'Africa', subregion: 'África del Norte', flag: 'https://flagcdn.com/w320/eg.png', capital: 'El Cairo', population: 102300000, area: 1010408, currency: 'Libra egipcia (EGP)', language: 'Árabe', borders: 'Gaza, Israel, Libia, Sudán', calling: '+20', code: 'EGY' },
  { name: 'Sudáfrica', nameEn: 'South Africa', region: 'Africa', subregion: 'África del Sur', flag: 'https://flagcdn.com/w320/za.png', capital: 'Pretoria', population: 59310000, area: 1221037, currency: 'Rand sudafricano (ZAR)', language: '11 idiomas oficiales', borders: 'Botsuana, Lesoto, Mozambique, Namibia, Esuatini, Zimbabue', calling: '+27', code: 'ZAF' }
];

let selectedCountry = null;

const statusEl = document.getElementById('status');
const countryPickerEl = document.getElementById('countryPicker');
const detailPanelEl = document.getElementById('detailPanel');
const charPickerEl = document.getElementById('charPicker');
const stampFieldsEl = document.getElementById('stampFields');
const chips = document.querySelectorAll('.chip');

const CHARACTERISTICS = [
  { id: 'capital',   label: 'Capital',        get: c => c.capital },
  { id: 'population', label: 'Población',      get: c => c.population.toLocaleString('es-MX') },
  { id: 'area',       label: 'Área',           get: c => `${c.area.toLocaleString('es-MX')} km²` },
  { id: 'region',     label: 'Región',         get: c => `${c.region} · ${c.subregion}` },
  { id: 'currency',   label: 'Moneda',         get: c => c.currency },
  { id: 'language',   label: 'Idioma',         get: c => c.language },
  { id: 'borders',    label: 'Fronteras',      get: c => c.borders },
  { id: 'calling',    label: 'Código telefónico', get: c => c.calling },
  { id: 'code',       label: 'Código ISO',     get: c => c.code },
];
const DEFAULT_SELECTED = ['capital', 'population', 'region'];
let checkedChars = new Set(DEFAULT_SELECTED);

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

chips.forEach(chip => {
  chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    searchByRegion(chip.dataset.region);
  });
});

document.getElementById('changeCountryBtn').addEventListener('click', () => {
  selectedCountry = null;
  detailPanelEl.classList.add('hidden');
  countryPickerEl.classList.remove('hidden');
});

function showStatus(msg, type){
  statusEl.className = type;
  statusEl.textContent = msg;
}
function hideStatus(){
  statusEl.className = 'hidden';
}

function cleanText(text) {
  return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function doSearch(){
  const term = document.getElementById('searchInput').value.trim();
  if (!term){
    showStatus('Escribe el nombre de un país para buscar.', 'error');
    return;
  }
  chips.forEach(c => c.classList.remove('active'));
  detailPanelEl.classList.add('hidden');
  
  const cleanTerm = cleanText(term);
  const results = COUNTRIES_DB.filter(c => 
    cleanText(c.name).includes(cleanTerm) || 
    cleanText(c.nameEn).includes(cleanTerm)
  );

  renderPicker(results);
}

function searchByRegion(region){
  detailPanelEl.classList.add('hidden');
  const results = COUNTRIES_DB.filter(c => c.region === region);
  renderPicker(results);
}

function renderPicker(countries){
  if (!countries || !countries.length){
    showStatus('No se encontraron países en la base de datos local.', 'error');
    countryPickerEl.classList.add('hidden');
    return;
  }
  hideStatus();
  countryPickerEl.classList.remove('hidden');
  countryPickerEl.innerHTML = countries.map((c, i) => {
    return `<button type="button" class="pick-item" data-id="${c.code}">
      <img src="${c.flag}" alt="${c.name}">
      <span>${c.name}</span>
    </button>`;
  }).join('');

  countryPickerEl.querySelectorAll('.pick-item').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedCountry = countries.find(c => c.code === btn.dataset.id);
      openDetail();
    });
  });
}

function openDetail(){
  countryPickerEl.classList.add('hidden');
  detailPanelEl.classList.remove('hidden');

  document.getElementById('selectedFlag').src = selectedCountry.flag;
  document.getElementById('selectedName').textContent = selectedCountry.name;

  checkedChars = new Set(DEFAULT_SELECTED);
  renderCharPicker();
  renderStamp();
}

function renderCharPicker(){
  charPickerEl.innerHTML = CHARACTERISTICS.map(ch => `
    <label class="char-check ${checkedChars.has(ch.id) ? 'checked' : ''}" data-id="${ch.id}">
      <input type="checkbox" ${checkedChars.has(ch.id) ? 'checked' : ''}>
      ${ch.label}
    </label>
  `).join('');

  charPickerEl.querySelectorAll('.char-check').forEach(label => {
    label.addEventListener('click', e => {
      e.preventDefault();
      const id = label.dataset.id;
      if (checkedChars.has(id)){
        checkedChars.delete(id);
      } else {
        checkedChars.add(id);
      }
      renderCharPicker();
      renderStamp();
    });
  });
}

function renderStamp(){
  stampFieldsEl.innerHTML = CHARACTERISTICS
    .filter(ch => checkedChars.has(ch.id))
    .map(ch => `
      <div>
        <div class="field-label">${ch.label}</div>
        <div class="field-value">${ch.get(selectedCountry)}</div>
      </div>
    `).join('');
}
</script>
</body>
</html>
