<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador de Países — REST Countries API</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a; /* Fondo azul oscuro profundo */
    --card: #1e293b; /* Tarjetas azul grisáceo */
    --border: #334155; /* Bordes sutiles */
    --accent: #38bdf8; /* Azul brillante para detalles */
    --accent-hover: #0ea5e9;
    --text: #f8fafc; /* Texto claro */
    --text-muted: #94a3b8; /* Texto secundario */
    --error-bg: #451a03;
    --error-text: #fecdd3;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  
  .wrap { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
  }
  header h1 {
    font-size: 2.5rem;
    font-weight: 800;
    margin: 0 0 0.4rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 1rem;
  }

  .step {
    margin-bottom: 2rem;
  }
  .step-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin: 0 0 0.8rem;
  }

  .search-box {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .search-box input {
    flex: 1;
    padding: 0.9rem 1.1rem;
    font-size: 1rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
  }
  .search-box input:focus { outline: none; border-color: var(--accent); }
  
  button {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    padding: 0.9rem 1.6rem;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: var(--bg);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: var(--accent-hover); }
  button:active { transform: translateY(1px); }

  .regions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .chip {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .chip:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  #status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    margin-bottom: 1.5rem;
  }
  #status.hidden { display: none; }
  #status.loading { background: var(--card); border: 1px dashed var(--border); color: var(--text-muted); }
  #status.error { background: var(--error-bg); color: var(--error-text); border: 1px solid #991b1b; }

  #countryPicker {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.75rem;
  }
  #countryPicker.hidden { display: none; }
  
  .pick-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    text-align: left;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    width: 100%;
    transition: border-color 0.2s;
  }
  .pick-item:hover { border-color: var(--accent); }
  .pick-item img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #fff; }

  #detailPanel.hidden { display: none; }
  
  .selected-country {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .selected-country-left { display: flex; align-items: center; gap: 1rem; }
  .selected-country-left img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .selected-country-left h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0;
  }
  .selected-country button {
    padding: 0.6rem 1.1rem;
    font-size: 0.85rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .selected-country button:hover { background: var(--border); }

  .char-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }
  .char-check {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 500;
    font-size: 0.85rem;
    padding: 0.55rem 1.1rem;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
    transition: all 0.2s;
  }
  .char-check.checked {
    border-color: var(--accent);
    background: rgba(56, 189, 248, 0.1);
    color: var(--accent);
  }
  .char-check input { display: none; }

  .stamp {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 1.75rem;
  }
  .stamp-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem 1.5rem;
  }
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 0.3rem;
  }
  .field-value {
    font-size: 1.05rem;
    color: var(--text);
    line-height: 1.4;
  }

  @media (max-width: 600px) {
    .stamp-fields { grid-template-columns: 1fr; }
    .selected-country { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .selected-country button { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Explorador de Países</h1>
    <p>Elige un país y luego selecciona qué características ver de él</p>
  </header>

  <div class="step">
    <p class="step-title">Paso 1 · Elige un país</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar país... (ej. Canada, México, Japón)">
      <button id="searchBtn" type="button">Buscar</button>
    </div>
    <div class="regions">
      <button class="chip" data-region="Americas" type="button">Américas</button>
      <button class="chip" data-region="Africa" type="button">África</button>
      <button class="chip" data-region="Asia" type="button">Asia</button>
      <button class="chip" data-region="Europe" type="button">Europa</button>
      <button class="chip" data-region="Oceania" type="button">Oceanía</button>
    </div>
  </div>

  <div id="status" class="hidden"></div>

  <div id="countryPicker"></div>

  <div id="detailPanel" class="hidden">
    <div class="selected-country">
      <div class="selected-country-left">
        <img id="selectedFlag" src="" alt="">
        <h2 id="selectedName"></h2>
      </div>
      <button type="button" id="changeCountryBtn">Cambiar país</button>
    </div>

    <div class="step">
      <p class="step-title">Paso 2 · Elige qué características ver</p>
      <div class="char-picker" id="charPicker"></div>
    </div>

    <div class="stamp">
      <div class="stamp-fields" id="stampFields"></div>
    </div>
  </div>

</div>

<script>
let selectedCountry = null;

const statusEl = document.getElementById('status');
const countryPickerEl = document.getElementById('countryPicker');
const detailPanelEl = document.getElementById('detailPanel');
const charPickerEl = document.getElementById('charPicker');
const stampFieldsEl = document.getElementById('stampFields');
const chips = document.querySelectorAll('.chip');

const CHARACTERISTICS = [
  { id: 'capital',   label: 'Capital',        get: c => (c.capital && c.capital[0]) || 'No disponible' },
  { id: 'population', label: 'Población',      get: c => c.population != null ? Number(c.population).toLocaleString('es-MX') : 'No disponible' },
  { id: 'area',       label: 'Área',           get: c => c.area != null ? `${Number(c.area).toLocaleString('es-MX')} km²` : 'No disponible' },
  { id: 'region',     label: 'Región',         get: c => [c.region, c.subregion].filter(Boolean).join(' · ') || 'No disponible' },
  { id: 'currency',   label: 'Moneda',         get: c => c.currencies ? Object.values(c.currencies).map(cur => `${cur.name} (${cur.symbol || ''})`).join(', ') : 'No disponible' },
  { id: 'language',   label: 'Idioma',         get: c => c.languages ? Object.values(c.languages).join(', ') : 'No disponible' },
  { id: 'borders',    label: 'Fronteras',      get: c => (c.borders || []).join(', ') || 'Sin fronteras terrestres' },
  { id: 'calling',    label: 'Código telefónico', get: c => c.idd ? `${c.idd.root || ''}${(c.idd.suffixes || []).join(', ')}` : 'No disponible' },
  { id: 'code',       label: 'Código ISO',     get: c => c.cca3 || c.cca2 || 'No disponible' },
];
const DEFAULT_SELECTED = ['capital', 'population', 'region'];
let checkedChars = new Set(DEFAULT_SELECTED);

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
chips.forEach(chip => {
  chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    searchByRegion(chip.dataset.region);
  });
});
document.getElementById('changeCountryBtn').addEventListener('click', () => {
  selectedCountry = null;
  detailPanelEl.classList.add('hidden');
  countryPickerEl.classList.remove('hidden');
});

function showStatus(msg, type){
  statusEl.className = type;
  statusEl.textContent = msg;
}
function hideStatus(){
  statusEl.className = 'hidden';
}

// Llamada directa sin proxies propensos a errores 408
async function callApi(endpoint){
  const targetUrl = `https://restcountries.com/v3.1/${endpoint}`;
  const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;
  
  const response = await fetch(proxyUrl);
  if (!response.ok){
    if (response.status === 404){
      throw new Error('No se encontraron resultados para tu búsqueda.');
    }
    throw new Error(`La API respondió con error ${response.status}.`);
  }
  return response.json();
}

async function doSearch(){
  const term = document.getElementById('searchInput').value.trim();
  if (!term){
    showStatus('Escribe el nombre de un país para buscar.', 'error');
    return;
  }
  chips.forEach(c => c.classList.remove('active'));
  showStatus('Consultando la API...', 'loading');
  countryPickerEl.innerHTML = '';
  detailPanelEl.classList.add('hidden');
  try{
    const raw = await callApi(`name/${encodeURIComponent(term)}`);
    renderPicker(raw);
  }catch(err){
    showStatus(`Error: ${err.message}`, 'error');
  }
}

async function searchByRegion(region){
  showStatus('Consultando la API...', 'loading');
  countryPickerEl.innerHTML = '';
  detailPanelEl.classList.add('hidden');
  try{
    const raw = await callApi(`region/${encodeURIComponent(region)}`);
    renderPicker(raw);
  }catch(err){
    showStatus(`Error: ${err.message}`, 'error');
  }
}

function renderPicker(countries){
  if (!countries || !countries.length){
    showStatus('No se encontraron países con ese criterio.', 'error');
    return;
  }
  hideStatus();
  countryPickerEl.classList.remove('hidden');
  countryPickerEl.innerHTML = countries.map((c, i) => {
    const name = c.translations?.spa?.common || c.name?.common || 'Desconocido';
    const flag = c.flags?.png || c.flags?.svg || '';
    return `<button type="button" class="pick-item" data-index="${i}">
      ${flag ? `<img src="${flag}" alt="">` : ''}
      <span>${name}</span>
    </button>`;
  }).join('');

  countryPickerEl.querySelectorAll('.pick-item').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedCountry = countries[Number(btn.dataset.index)];
      openDetail();
    });
  });
}

function openDetail(){
  countryPickerEl.classList.add('hidden');
  detailPanelEl.classList.remove('hidden');

  document.getElementById('selectedFlag').src = selectedCountry.flags?.png || selectedCountry.flags?.svg || '';
  document.getElementById('selectedName').textContent = selectedCountry.translations?.spa?.common || selectedCountry.name?.common || 'Desconocido';

  checkedChars = new Set(DEFAULT_SELECTED);
  renderCharPicker();
  renderStamp();
}

function renderCharPicker(){
  charPickerEl.innerHTML = CHARACTERISTICS.map(ch => `
    <label class="char-check ${checkedChars.has(ch.id) ? 'checked' : ''}" data-id="${ch.id}">
      <input type="checkbox" ${checkedChars.has(ch.id) ? 'checked' : ''}>
      ${ch.label}
    </label>
  `).join('');

  charPickerEl.querySelectorAll('.char-check').forEach(label => {
    label.addEventListener('click', e => {
      e.preventDefault();
      const id = label.dataset.id;
      if (checkedChars.has(id)){
        checkedChars.delete(id);
      } else {
        checkedChars.add(id);
      }
      renderCharPicker();
      renderStamp();
    });
  });
}

function renderStamp(){
  stampFieldsEl.innerHTML = CHARACTERISTICS
    .filter(ch => checkedChars.has(ch.id))
    .map(ch => `
      <div>
        <div class="field-label">${ch.label}</div>
        <div class="field-value">${ch.get(selectedCountry)}</div>
      </div>
    `).join('');
}
</script>
</body>
</html>
